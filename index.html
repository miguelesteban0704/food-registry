<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Registry System</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-main: #1f2937;
            --text-muted: #4b5563;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
        }

        /* --- LOGIN CARD --- */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            margin-top: 10vh;
            box-sizing: border-box;
            text-align: center;
        }

        .login-card h3 {
            color: #312e81;
            margin-bottom: 25px;
            font-size: 1.6rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: flex-start;
            min-height: 24px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-main);
            cursor: pointer;
        }

        .checkbox-label input {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
        }

        #admin-box {
            display: none;
        }

        /* --- MAIN CONTAINER --- */
        .container {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            padding: 30px 20px;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .header-app {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 15px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h2 {
            color: #312e81;
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .user-info {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: #f3f4f6;
            color: var(--text-main);
            padding: 16px 10px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
            border-bottom: 2px solid #e5e7eb;
            white-space: nowrap;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #edf2f7;
            color: var(--text-muted);
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f9fafb;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
            min-width: 140px;
        }

        input[type="text"]:disabled, select:disabled, input[type="radio"]:disabled {
            background-color: #f3f4f6;
            color: #1f2937 !important;
            cursor: not-allowed;
            opacity: 0.9;
        }

        select {
            width: 100%;
            max-width: 150px;
            padding: 8px 24px 8px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background-color: #fff;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234b5563' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 14px;
        }

        select option {
            white-space: normal;
            font-size: 14px;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            min-width: 90px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .radio-label input[type="radio"] {
            accent-color: var(--primary-color);
        }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .right-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-login {
            background-color: var(--primary-color);
            color: white;
            width: 100%;
        }
        .btn-login:hover { background-color: var(--primary-hover); }

        .btn-add { background-color: #10b981; color: white; }
        .btn-add:hover { background-color: #059669; }
        .btn-add:disabled { background-color: #a7f3d0; cursor: not-allowed; }

        .btn-edit { background-color: #f59e0b; color: white; display: none; }
        .btn-edit:hover { background-color: #d97706; }

        .btn-excel { background-color: #217346; color: white; }
        .btn-excel:hover { background-color: #1a5c38; }

        .btn-clear { background-color: #6b7280; color: white; }
        .btn-clear:hover { background-color: #4b5563; }

        .btn-logout {
            background-color: #f3f4f6;
            color: #374151;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
        }
        .btn-logout:hover { background-color: #e5e7eb; }

        .btn-delete {
            background-color: #ef4444;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
        }
        .btn-delete:hover { background-color: #dc2626; }

        .admin-only { display: none; }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .login-card {
                padding: 30px 20px;
                margin-top: 5vh;
            }

            .container {
                padding: 20px 15px;
                border-radius: 12px;
            }

            .header-app {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .user-info {
                width: 100%;
                justify-content: space-between;
            }

            .btn-container {
                flex-direction: column;
                gap: 10px;
            }

            .btn-container > div, 
            .right-buttons {
                display: flex;
                flex-direction: column;
                width: 100%;
                gap: 10px;
            }

            .btn {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

<div class="login-card" id="loginCard">
    <h3>Sign In</h3>
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Participant Name</label>
            <input type="text" id="username" placeholder="Type your name here..." required oninput="verificarAdminUser(this.value)">
        </div>
        
        <div class="checkbox-group">
            <label class="checkbox-label" id="participante-box">
                <input type="checkbox" id="chk-participante"> Participant *
            </label>
            <label class="checkbox-label" id="admin-box">
                <input type="checkbox" id="chk-admin"> Administrator *
            </label>
        </div>

        <button type="button" class="btn btn-login" onclick="procesarLogin(event)">Login</button>
    </form>
</div>

<div class="container" id="appContainer">
    <div class="header-app">
        <h2>Food Preference Control</h2>
        <div class="user-info">
            <span id="user-display">User: </span>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <form id="foodForm" onsubmit="event.preventDefault();">
        <div class="table-wrapper">
            <table id="participantsTable">
                <thead>
                    <tr>
                        <th>Participant Name</th>
                        <th>Breakfast</th>
                        <th>Lunch</th>
                        <th>Dinner</th>
                        <th>Diet Type</th>
                        <th>Protein</th>
                        <th>Main Base</th>
                        <th>Spice Level</th>
                        <th>Seafood/Fish</th>
                        <th>Restrictions/Allergies</th>
                        <th class="col-accion admin-only">Action</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div class="btn-container">
            <div>
                <button type="button" class="btn btn-add" id="btnGuardar" onclick="ejecutarGuardado()" disabled>Save Changes</button>
                <button type="button" class="btn btn-edit" id="btnEditar" onclick="habilitarModoEdicion()">✏️ Edit Fields</button>
                <button type="button" class="btn btn-add admin-only" id="btnAdminAdd" onclick="agregarFilaManualAdmin()" style="background-color: #3b82f6;">+ Add Participant</button>
            </div>
            <div class="right-buttons">
                <button type="button" class="btn btn-clear admin-only" id="btnClear" onclick="limpiarBaseDatos()">Clear All</button>
                <button type="button" class="btn btn-excel admin-only" id="btnExcel" onclick="exportarExcel()">📊 Export to Excel</button>
            </div>
        </div>
    </form>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://foodregistry-f3ca5-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let contadorFilas = 0;
    let usuarioLogueado = null;
    let esAdmin = false;
    let cambiosSinGuardar = false;

    function verificarAdminUser(val) {
        const adminBox = document.getElementById("admin-box");
        const participanteBox = document.getElementById("participante-box");
        const chkParticipante = document.getElementById("chk-participante");
        const chkAdmin = document.getElementById("chk-admin");

        if (val.trim() === "miguel_admin") {
            participanteBox.style.display = "none";
            chkParticipante.required = false;
            chkParticipante.checked = false;
            adminBox.style.display = "flex";
            chkAdmin.required = true;
        } else {
            participanteBox.style.display = "flex";
            chkParticipante.required = true;
            adminBox.style.display = "none";
            chkAdmin.required = false;
            chkAdmin.checked = false;
        }
    }

    function procesarLogin(event) {
        event.preventDefault();
        const user = document.getElementById("username").value.trim();
        const chkAdmin = document.getElementById("chk-admin").checked;

        usuarioLogueado = user;
        esAdmin = (user === "miguel_admin" && chkAdmin);
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        document.getElementById("user-display").innerText = `Usuario: ${user} (${esAdmin ? 'Admin' : 'Participante'})`;

        inicializarInterfaz();
    }

    function limpiarBaseDatos() {
    if(confirm("Are you sure you want to completely clear ALL participant data?")) {
        // En lugar de borrar localmente y esperar, enviamos el array vacío a la nube
        database.ref("preferencias").set([], (error) => {
            if (error) {
                alert("Error clearing data: " + error.message);
            } else {
                // Al limpiar Firebase, el evento .on('value') disparará automáticamente 
                // la actualización de la tabla.
                alert("All data cleared successfully.");
            }
        });
    }
}

    function inicializarInterfaz() {
        const elementosAdmin = document.querySelectorAll(".admin-only");
        elementosAdmin.forEach(el => {
            el.style.display = esAdmin ? "inline-block" : "none";
            if (el.tagName === "TH" || el.tagName === "TD") {
                el.style.display = esAdmin ? "table-cell" : "none";
            }
        });
        document.getElementById("btnGuardar").innerText = esAdmin ? "Save Data" : "Save Data";
        
        cargarDatosDeLocalStorage();
        
        if (!esAdmin) {
            const datos = obtenerDatosBD();
            const yaRegistrado = datos.some(p => p.nombre.toLowerCase() === usuarioLogueado.toLowerCase());
            if (yaRegistrado) {
                bloquearCamposFila(true);
                document.getElementById("btnEditar").style.display = "inline-block";
                document.getElementById("btnGuardar").style.display = "none";
            } else {
                const tbody = document.querySelector("#participantsTable tbody");
                if(tbody.children.length === 0) {
                    crearEstructuraFila(1, { nombre: usuarioLogueado }, true);
                }
                document.getElementById("btnGuardar").disabled = true;
            }
        }
        document.getElementById("foodForm").addEventListener("input", marcarCambios);
    }

    function marcarCambios() {
        cambiosSinGuardar = true;
        document.getElementById("btnGuardar").disabled = false;
    }

    function bloquearCamposFila(bloquear) {
        document.querySelectorAll("#participantsTable tbody input, #participantsTable tbody select").forEach(input => {
            if (!esAdmin && input.name.startsWith("nombre_")) input.disabled = true;
            else input.disabled = bloquear;
        });
    }

    function agregarFilaManualAdmin() {
        contadorFilas++;
        crearEstructuraFila(Date.now(), {}, false);
        marcarCambios();
    }

    function ejecutarGuardado() {
    
    let nuevosDatos = recolectarDatosTabla();
    let baseDatosActual = obtenerDatosBD();

    // Lógica para actualizar el array
    if (!esAdmin) {
        let registroParticipante = nuevosDatos[0];
        let index = baseDatosActual.findIndex(p => p.nombre.toLowerCase() === usuarioLogueado.toLowerCase());
        if (index !== -1) baseDatosActual[index] = registroParticipante;
        else baseDatosActual.push(registroParticipante);
    } else {
        baseDatosActual = nuevosDatos;
    }

    // 1. Guardar en LocalStorage
    localStorage.setItem("preferencias_participantes", JSON.stringify(baseDatosActual));

    // 2. Sincronizar con Firebase
    database.ref("preferencias").set(baseDatosActual)
    .then(() => {
        alert("¡Guardado correctamente en la nube!");
        cambiosSinGuardar = false;
        // NO recargues la página aquí para no perder el estado
        inicializarInterfaz();
    })
    .catch((error) => {
        alert("Error al guardar: " + error.message);
    });
}

    function habilitarModoEdicion() {
        bloquearCamposFila(false);
        document.getElementById("btnEditar").style.display = "none";
        document.getElementById("btnGuardar").style.display = "inline-block";
        document.getElementById("btnGuardar").disabled = false;
    }

    function crearEstructuraFila(id, datos, bloquearNombre) {
        const tbody = document.querySelector("#participantsTable tbody");
        const row = document.createElement("tr");
        row.setAttribute("data-id", id);
        row.innerHTML = `
            <td><input type="text" name="nombre_${id}" value="${datos.nombre || ''}" ${bloquearNombre ? 'readonly' : 'required'}></td>
            <td><div class="radio-group"><label><input type="radio" name="desayuno_${id}" value="Yes" ${datos.desayuno!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="desayuno_${id}" value="NO" ${datos.desayuno==='NO'?'checked':''}> No</label></div></td>
            <td><div class="radio-group"><label><input type="radio" name="almuerzo_${id}" value="Yes" ${datos.almuerzo!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="almuerzo_${id}" value="NO" ${datos.almuerzo==='NO'?'checked':''}> No</label></div></td>
            <td><div class="radio-group"><label><input type="radio" name="cena_${id}" value="Yes" ${datos.cena!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="cena_${id}" value="NO" ${datos.cena==='NO'?'checked':''}> No</label></div></td>
            <td><select name="dieta_${id}" required><option value="Omnivore" ${datos.dieta==='Omnivore'?'selected':''}>Omnivore</option><option value="Vegetarian" ${datos.dieta==='Vegetarian'?'selected':''}>Vegetarian</option><option value="Vegan" ${datos.dieta==='Vegan'?'selected':''}>Vegan</option></select></td>
            <td><select name="proteina_${id}" required><option value="Meat" ${datos.proteina==='Meat'?'selected':''}>Meat</option><option value="None" ${datos.proteina==='None'?'selected':''}>None</option></td>
            <td><select name="base_${id}" required><option value="Rice" ${datos.base==='Rice'?'selected':''}>Rice</option><option value="Pasta" ${datos.base==='Pasta'?'selected':''}>Pasta</option><option value="Bread" ${datos.base==='Bread'?'selected':''}>Bread</option></select></td>
            <td><select name="picante_${id}" required><option value="No Spicy" ${datos.picante==='No Spicy'?'selected':''}>No Spicy</option><option value="Spicy" ${datos.picante==='Spicy'?'selected':''}>Spicy</option></select></td>
            <td><div class="radio-group"><label><input type="radio" name="mariscos_${id}" value="Yes" ${datos.mariscos!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="mariscos_${id}" value="NO" ${datos.mariscos==='NO'?'checked':''}> No</label></div></td>
            <td><input type="text" name="alergias_${id}" value="${datos.alergias || ''}"></td>
            <td class="admin-only" style="display:${esAdmin?'table-cell':'none'}"><button class="btn btn-delete" onclick="eliminarFila(this)">Delete</button></td>
        `;
        tbody.appendChild(row);
    }

    function eliminarFila(boton) {
    // Eliminamos la fila de la interfaz
    boton.closest("tr").remove();
    
    // Recolectamos los datos que quedaron en la tabla
    let datosRestantes = recolectarDatosTabla();
    
    // Guardamos el nuevo estado (sin la fila eliminada) en Firebase
    database.ref("preferencias").set(datosRestantes, (error) => {
        if (error) {
            alert("Error updating data: " + error.message);
        } else {
            // Actualizamos el respaldo local
            localStorage.setItem("preferencias_participantes", JSON.stringify(datosRestantes));
            console.log("Fila eliminada y base de datos sincronizada.");
        }
    });
}

    function recolectarDatosTabla() {
        const datos = [];
        document.querySelectorAll("#participantsTable tbody tr").forEach(row => {
            const id = row.getAttribute("data-id");
            datos.push({
                nombre: row.querySelector(`[name="nombre_${id}"]`).value,
                desayuno: row.querySelector(`[name="desayuno_${id}"]:checked`).value,
                almuerzo: row.querySelector(`[name="almuerzo_${id}"]:checked`).value,
                cena: row.querySelector(`[name="cena_${id}"]:checked`).value,
                dieta: row.querySelector(`[name="dieta_${id}"]`).value,
                proteina: row.querySelector(`[name="proteina_${id}"]`).value,
                base: row.querySelector(`[name="base_${id}"]`).value,
                picante: row.querySelector(`[name="picante_${id}"]`).value,
                mariscos: row.querySelector(`[name="mariscos_${id}"]:checked`).value,
                alergias: row.querySelector(`[name="alergias_${id}"]`).value
            });
        });
        return datos;
    }

    function obtenerDatosBD() {
        return JSON.parse(localStorage.getItem("preferencias_participantes") || "[]");
    }

    function cargarDatosDeLocalStorage() {
        const datos = obtenerDatosBD();
        const tbody = document.querySelector("#participantsTable tbody");
        tbody.innerHTML = "";
        datos.forEach(p => {
            if (esAdmin || p.nombre.toLowerCase() === usuarioLogueado.toLowerCase()) {
                crearEstructuraFila(Date.now() + Math.random(), p, !esAdmin);
            }
        });
    }

    function logout() {
        location.reload();
    }

    // Asegúrate de que esta función esté definida antes o después de exportarExcel
function verificarEstadoGuardado() {
    if (cambiosSinGuardar) {
        alert("⚠️ You have unsaved changes. Please click 'Save' to protect the records.");
        return false;
    }
    return true;
}

    function exportarExcel() {
    if (!verificarEstadoGuardado()) return;
    const datos = recolectarDatosTabla().filter(p => p.nombre.trim() !== "");
    if (datos.length === 0) {
        alert("No records to export.");
        return;
    }

    const headers = ["PARTICIPANT NAME", "BREAKFAST", "LUNCH", "DINNER", "DIET TYPE", "PROTEIN", "MAIN BASE", "SPICE LEVEL", "SEAFOOD/FISH", "RESTRICTIONS/ALLERGIES"];
    
    // Estilos CSS modernos para Excel
    let html = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
    <head>
        <meta charset="utf-8"/>
        <style>
            table { border-collapse: collapse; font-family: 'Segoe UI', sans-serif; }
            th { 
                background-color: #1e1b4b !important; 
                color: #ffffff !important; 
                font-weight: bold; 
                padding: 12px; 
                text-align: center; 
                border: 1px solid #4338ca;
            }
            td { 
                padding: 10px; 
                border: 1px solid #e5e7eb; 
                text-align: center; 
                color: #374151; 
            }
            .alt-row { background-color: #f9fafb; }
        </style>
    </head>
    <body>
        <table border="1">
            <thead>
                <tr>
                    ${headers.map(h => `<th>${h}</th>`).join('')}
                </tr>
            </thead>
            <tbody>`;

    datos.forEach((p, index) => {
        const rowClass = (index % 2 !== 0) ? 'class="alt-row"' : '';
        html += `<tr ${rowClass}>
            <td style="font-weight: bold; text-align: left;">${p.nombre}</td>
            <td>${p.desayuno}</td>
            <td>${p.almuerzo}</td>
            <td>${p.cena}</td>
            <td>${p.dieta}</td>
            <td>${p.proteina}</td>
            <td>${p.base}</td>
            <td>${p.picante}</td>
            <td>${p.mariscos}</td>
            <td>${p.alergias}</td>
        </tr>`;
    });

    html += `</tbody></table></body></html>`;

    // Descarga infalible
    const blob = new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Food_Preferences_Report.xls";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
