<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Registry System</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
    --primary-color:#7c3aed;
    --primary-hover:#6d28d9;

    --success:#10b981;
    --success-hover:#059669;

    --warning:#f59e0b;
    --warning-hover:#d97706;

    --danger:#ef4444;
    --danger-hover:#dc2626;

    --text-main:#ffffff;
    --text-muted:#cbd5e1;

    --glass-bg:rgba(255,255,255,.08);
    --glass-border:rgba(255,255,255,.12);

    --shadow:
        0 20px 60px rgba(0,0,0,.35);

    --radius:22px;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Inter',sans-serif;

    background:
    radial-gradient(circle at top left,#7c3aed 0%,transparent 35%),
    radial-gradient(circle at top right,#06b6d4 0%,transparent 30%),
    linear-gradient(135deg,#020617,#0f172a);

    min-height:100vh;

    padding:25px;

    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:10px;
    height:10px;
}

::-webkit-scrollbar-track{
    background:rgba(255,255,255,.05);
}

::-webkit-scrollbar-thumb{
    background:#7c3aed;
    border-radius:20px;
}

/* LOGIN */

.login-card{
    background:var(--glass-bg);

    backdrop-filter:blur(30px);

    border:1px solid var(--glass-border);

    border-radius:30px;

    box-shadow:var(--shadow);

    padding:45px;

    width:100%;
    max-width:450px;

    margin-top:8vh;

    text-align:center;

    animation:fadeUp .6s ease;
}

.login-card h3{
    color:white;
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
    letter-spacing:-1px;
}

.input-group{
    margin-bottom:20px;
    text-align:left;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#e2e8f0;
    font-size:14px;
    font-weight:600;
}

.input-group input[type="text"]{
    width:100%;
}

/* CHECKBOXES */

.checkbox-group{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.checkbox-label{
    display:flex;
    align-items:center;
    gap:8px;

    color:#e2e8f0;

    cursor:pointer;
}

.checkbox-label input{
    accent-color:var(--primary-color);
    width:18px;
    height:18px;
}

#admin-box{
    display:none;
}

/* CONTAINER */

.container{
    display:none;

    width:100%;

    background:var(--glass-bg);

    backdrop-filter:blur(30px);

    border:1px solid var(--glass-border);

    border-radius:30px;

    box-shadow:var(--shadow);

    padding:30px;
}

/* HEADER */

.header-app{
    display:flex;
    justify-content:space-between;
    align-items:center;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:25px;

    padding-bottom:20px;

    border-bottom:1px solid rgba(255,255,255,.08);
}

h2{
    color:white;
    font-size:2rem;
    font-weight:700;
    letter-spacing:-1px;
}

.user-info{
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;

    color:var(--text-muted);
}


table{
    width:100%;
    border-collapse:collapse;

    background:transparent;

    font-size:13px;
}

thead{
    z-index:10;
}

th{
    background:rgba(255,255,255,.08);

    color:white;

    padding:16px 12px;

    font-size:11px;

    text-transform:uppercase;

    letter-spacing:.08em;

    font-weight:700;

    white-space:nowrap;

    border-bottom:1px solid rgba(255,255,255,.08);
}

td{
    padding:12px;

    color:#e2e8f0;

    border-bottom:1px solid rgba(255,255,255,.05);

    vertical-align:middle;
}

tbody tr{
    transition:.25s;
}

tbody tr:hover{
    background:rgba(255,255,255,.05);
}

/* INPUTS */

input[type="text"],
select{
    width:100%;

    padding:10px 12px;

    background:rgba(255,255,255,.08);

    color:white;

    border:1px solid rgba(255,255,255,.12);

    border-radius:12px;

    font-size:13px;

    transition:.25s;
}

input::placeholder{
    color:#94a3b8;
}

input[type="text"]:focus,
select:focus{
    outline:none;

    border-color:#8b5cf6;

    box-shadow:
    0 0 0 4px rgba(124,58,237,.20);
}

input[type="text"]:disabled,
select:disabled,
input[type="radio"]:disabled{
    background:rgba(255,255,255,.04);
    color:#e2e8f0 !important;
    opacity:.7;
}

select { 
    width: 100%; max-width: 170px; padding: 10px 38px 10px 14px; border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06)); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; appearance: none; -webkit-appearance: none; -moz-appearance: none; transition: all 0.25s ease; backdrop-filter: blur(12px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 4px 12px rgba(0,0,0,0.18); background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; } select:hover { border-color: rgba(139,92,246,0.6); box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 6px 16px rgba(124,58,237,0.18); transform: translateY(-1px); } select:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(124,58,237,0.18), inset 0 1px 0 rgba(255,255,255,0.18); transform: translateY(-1px); } select option { background: #111827; color: #fff; font-size: 14px; 
    }

select option{
    background:#0f172a;
    color:#ffffff;

    padding:14px;

    font-size:14px;
    font-weight:500;

    border:none;
}

select optgroup{
    background:#020617;
    color:#a78bfa;
    font-weight:700;
}

/* RADIO */

.radio-group{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;

    white-space:nowrap;
}

.radio-group label{
    color:#e2e8f0;
    cursor:pointer;
}

.radio-group input{
    accent-color:var(--primary-color);
}

/* BUTTONS */

.btn-container{
    display:flex;
    justify-content:space-between;
    gap:15px;
    flex-wrap:wrap;
}

.right-buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    border:none;

    border-radius:14px;

    padding:12px 24px;

    font-size:14px;

    font-weight:600;

    cursor:pointer;

    transition:.25s;

    box-shadow:
    0 10px 25px rgba(0,0,0,.25);
}

.btn:hover{
    transform:translateY(-3px);
}

.btn-login{
    width:100%;

    background:
    linear-gradient(135deg,#8b5cf6,#6366f1);

    color:white;
}

.btn-login:hover{
    background:
    linear-gradient(135deg,#7c3aed,#4f46e5);
}

.btn-add{
    background:
    linear-gradient(135deg,#10b981,#059669);

    color:white;
}

.btn-add:hover{
    background:
    linear-gradient(135deg,#34d399,#10b981);
}

.btn-add:disabled{
    opacity:.5;
    cursor:not-allowed;
}

.btn-edit{
    display:none;

    background:
    linear-gradient(135deg,#f59e0b,#d97706);

    color:white;
}

.btn-excel{
    background:
    linear-gradient(135deg,#22c55e,#15803d);

    color:white;
}

.btn-clear{
    background:
    linear-gradient(135deg,#64748b,#475569);

    color:white;
}

.btn-logout{
    background:rgba(255,255,255,.08);

    color:white;

    border:1px solid rgba(255,255,255,.1);

    padding:8px 14px;

    font-size:12px;
}

.btn-delete{
    background:
    linear-gradient(135deg,#ef4444,#dc2626);

    color:white;

    padding:8px 12px;

    font-size:12px;
}

.admin-only{
    display:none;
}

/* TOASTS */

#toast-container{
    position:fixed;
    top:20px;
    right:20px;
    z-index:9999;
}

.toast{
    background:rgba(15,23,42,.95);

    color:white;

    backdrop-filter:blur(20px);

    border-radius:16px;

    padding:16px 24px;

    margin-bottom:12px;

    border-left:5px solid #10b981;

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);

    animation:slideIn .35s ease;
}

/* ANIMATIONS */

@keyframes slideIn{
    from{
        opacity:0;
        transform:translateX(50px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RESPONSIVE */

@media(max-width:768px){

    body{
        padding:12px;
    }

    .login-card{
        padding:30px 20px;
        margin-top:5vh;
    }

    .container{
        padding:20px 15px;
    }

    .header-app{
        flex-direction:column;
        align-items:flex-start;
    }

    .user-info{
        width:100%;
        justify-content:space-between;
    }

    .btn-container{
        flex-direction:column;
    }

    .btn-container > div,
    .right-buttons{
        display:flex;
        flex-direction:column;
        width:100%;
        gap:10px;
    }

    .btn{
        width:100%;
    }
}

/* ==========================
   PREMIUM DROPDOWN SaaS
========================== */

.select-hidden{
    display:none !important;
}

.premium-select{
    position:relative;
    min-width:160px;
    width:100%;
    font-size:13px;
}

.premium-select-trigger{
    display:flex;
    align-items:center;
    justify-content:space-between;

    width:100%;

    padding:10px 14px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,.05)
    );

    border:1px solid rgba(255,255,255,.15);

    border-radius:14px;

    color:white;

    cursor:pointer;

    transition:.25s;

    backdrop-filter:blur(12px);

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    0 4px 12px rgba(0,0,0,.18);
}

.premium-select-trigger:hover{
    border-color:rgba(139,92,246,.6);

    box-shadow:
    0 0 0 3px rgba(124,58,237,.15),
    0 6px 18px rgba(0,0,0,.22);
}

.premium-select.open .premium-select-trigger{
    border-color:#8b5cf6;
}

.premium-select-trigger-text{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.premium-select-arrow{
    transition:.25s;
}

.premium-select.open .premium-select-arrow{
    transform:rotate(180deg);
}

.premium-select-menu{
    position:absolute;

    left:0;
    right:0;

    top:calc(100% + 6px);

    background:#0f172a;

    border:1px solid rgba(255,255,255,.1);

    border-radius:16px;

    overflow:hidden;

    box-shadow:
    0 20px 40px rgba(0,0,0,.35);

    z-index:9999;

    opacity:0;
    visibility:hidden;

    transform:translateY(-8px);

    transition:.25s;
}

.premium-select.open .premium-select-menu{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.premium-select-option{
    padding:12px 14px;

    cursor:pointer;

    color:white;

    transition:.2s;

    border-bottom:1px solid rgba(255,255,255,.05);
}

.premium-select-option:last-child{
    border-bottom:none;
}

.premium-select-option:hover{
    background:
    rgba(139,92,246,.18);
}

.premium-select-option.active{
    background:
    rgba(139,92,246,.25);

    font-weight:600;
}
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="login-card" id="loginCard">
    <h3>Sign In</h3>
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Participant Name</label>
            <input type="text" id="username" placeholder="Type your name here..." required oninput="verificarAdminUser(this.value)">
        </div>
        
        <div class="checkbox-group">
            <label class="checkbox-label" id="participante-box">
                <input type="checkbox" id="chk-participante"> Participant *
            </label>
            <label class="checkbox-label" id="admin-box">
                <input type="checkbox" id="chk-admin"> Administrator *
            </label>
        </div>

        <button type="button" class="btn btn-login" onclick="procesarLogin(event)">Login</button>
    </form>
</div>

<div class="container" id="appContainer">
    <div class="header-app">
        <h2>Food Preference Control</h2>
        <div class="user-info">
            <span id="user-display">User: </span>
            <button class="btn btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <form id="foodForm" onsubmit="event.preventDefault();">
        <div class="table-wrapper">
            <table id="participantsTable">
                <thead>
                    <tr>
                        <th style="width: 50px; text-align: center;">No.</th>
                        <th>Participant Name</th>
                        <th>Breakfast</th>
                        <th>Lunch</th>
                        <th>Dinner</th>
                        <th>Diet Type</th>
                        <th>Protein</th>
                        <th>Main Base</th>
                        <th>Spice Level</th>
                        <th>Seafood/Fish</th>
                        <th>Restrictions/Allergies</th>
                        <th class="col-accion admin-only">Action</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <div class="btn-container">
            <div>
                <button type="button" class="btn btn-add" id="btnGuardar" onclick="ejecutarGuardado()" disabled>Save Changes</button>
                <button type="button" class="btn btn-edit" id="btnEditar" onclick="habilitarModoEdicion()">✏️ Edit Fields</button>
                <button type="button" class="btn btn-add admin-only" id="btnAdminAdd" onclick="agregarFilaManualAdmin()" style="background-color: #3b82f6;">+ Add Participant</button>
            </div>
            <div class="right-buttons">
                <button type="button" class="btn btn-clear admin-only" id="btnClear" onclick="limpiarBaseDatos()">Clear All</button>
                <button type="button" class="btn btn-excel admin-only" id="btnExcel" onclick="exportarExcel()">📊 Export to Excel</button>
            </div>
        </div>
    </form>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    function mostrarNotificacion(mensaje, tipo = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderLeftColor = tipo === 'error' ? '#ef4444' : '#10b981';
    toast.innerHTML = `<span>${mensaje}</span>`;
    
    container.appendChild(toast);
    
    // Auto-eliminar después de 3 segundos
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
    const firebaseConfig = { databaseURL: "https://foodregistry-f3ca5-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let contadorFilas = 0;
    let usuarioLogueado = null;
    let esAdmin = false;
    let cambiosSinGuardar = false;

    function verificarAdminUser(val) {
    const adminBox = document.getElementById("admin-box");
    const participanteBox = document.getElementById("participante-box");
    const chkParticipante = document.getElementById("chk-participante");
    const chkAdmin = document.getElementById("chk-admin");

    if (val.trim() === "miguel_admin") {
        participanteBox.style.display = "none";
        chkParticipante.required = false; 
        chkParticipante.checked = false; // Desmarcar el otro
        adminBox.style.display = "flex";
        chkAdmin.required = true;         // Ahora es obligatorio
    } else {
        participanteBox.style.display = "flex";
        chkParticipante.required = true;  // Ahora es obligatorio
        adminBox.style.display = "none";
        chkAdmin.required = false;
        chkAdmin.checked = false;        // Desmarcar el otro
    }
}

    function procesarLogin(event) {
    const user = document.getElementById("username").value.trim();
    const chkAdmin = document.getElementById("chk-admin");
    const chkParticipante = document.getElementById("chk-participante");

    // Validar si el campo nombre está vacío
    if (!user) {
        mostrarNotificacion("Please enter your name.", "error");
        return;
    }

    // Validar checkbox según el usuario
    if (user === "miguel_admin") {
        if (!chkAdmin.checked) {
            mostrarNotificacion("Please confirm you are an Administrator.", "error");
            return;
        }
    } else {
        if (!chkParticipante.checked) {
            mostrarNotificacion("Please confirm you are a Participant.", "error");
            return;
        }
    }

    // Si todo es correcto, prevenir el comportamiento por defecto y procesar
    event.preventDefault();
    usuarioLogueado = user;
    esAdmin = (user === "miguel_admin" && chkAdmin.checked);
    
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("appContainer").style.display = "block";
    document.getElementById("user-display").innerText = `User: ${user} (${esAdmin ? 'Admin' : 'Participant'})`;

    inicializarInterfaz();
}

function cerrarConfirmacion(confirmado) {
    document.getElementById("confirmModal").style.display = "none";
    if (confirmado) {
        // Aquí ejecutas la lógica de borrado original
        database.ref("preferencias").set([], (error) => {
            if (error) {
                mostrarNotificacion("Error clearing data: " + error.message, "error");
            } else {
                mostrarNotificacion("All data cleared successfully.");
                inicializarInterfaz();
            }
        });
    }
}

    function inicializarInterfaz() {
    const elementosAdmin = document.querySelectorAll(".admin-only");
    elementosAdmin.forEach(el => {
        el.style.display = esAdmin ? "inline-block" : "none";
        if (el.tagName === "TH" || el.tagName === "TD") {
            el.style.display = esAdmin ? "table-cell" : "none";
        }
    });

    // Cargar datos SIEMPRE de Firebase
    database.ref("preferencias").once("value").then((snapshot) => {
    const datos = snapshot.val() || [];
    localStorage.setItem("preferencias_participantes", JSON.stringify(datos));

    const tbody = document.querySelector("#participantsTable tbody");
    tbody.innerHTML = "";

    datos.forEach(p => {
        if (esAdmin || p.nombre.toLowerCase() === usuarioLogueado.toLowerCase()) {
            crearEstructuraFila(Date.now() + Math.random(), p, !esAdmin);
        }
    });

    // <-- AGREGAR AQUÍ
    inicializarPremiumSelects();

    // Lógica de usuario nuevo
    if (!esAdmin) {
        const yaRegistrado = datos.some(
            p => p.nombre.toLowerCase() === usuarioLogueado.toLowerCase()
        );

        if (yaRegistrado) {
            bloquearCamposFila(true);
            document.getElementById("btnEditar").style.display = "inline-block";
            document.getElementById("btnGuardar").style.display = "none";
        } else {
            crearEstructuraFila(1, { nombre: usuarioLogueado }, true);

            document.getElementById("btnGuardar").disabled = false;

            // <-- Y TAMBIÉN AQUÍ
            inicializarPremiumSelects();
        }
    }

    actualizarNumeracionFilas();
});
}

    function marcarCambios() {
        cambiosSinGuardar = true;
        document.getElementById("btnGuardar").disabled = false;
    }

    function bloquearCamposFila(bloquear) {
        document.querySelectorAll("#participantsTable tbody input, #participantsTable tbody select").forEach(input => {
            if (!esAdmin && input.name.startsWith("nombre_")) input.disabled = true;
            else input.disabled = bloquear;
        });
    }

    function agregarFilaManualAdmin() {
        contadorFilas++;
        crearEstructuraFila(Date.now(), {}, false);
        actualizarNumeracionFilas();
        marcarCambios();
    }

    function ejecutarGuardado() {
    database.ref("preferencias").once("value").then((snapshot) => {
        let baseDatosActual = snapshot.val() || [];
        let nuevosDatos = recolectarDatosTabla();

        if (!esAdmin) {
            let index = baseDatosActual.findIndex(p => p.nombre.toLowerCase() === usuarioLogueado.toLowerCase());
            if (index !== -1) baseDatosActual[index] = nuevosDatos[0];
            else baseDatosActual.push(nuevosDatos[0]);
        } else {
            baseDatosActual = nuevosDatos;
        }

        database.ref("preferencias").set(baseDatosActual).then(() => {
            mostrarNotificacion("Changes saved successfully to the cloud!");
            cambiosSinGuardar = false; // Resetear el estado de cambios
            inicializarInterfaz();
        }).catch((error) => {
            mostrarNotificacion("Error saving: " + error.message, "error");
        });
    });
}

    function habilitarModoEdicion() {
        bloquearCamposFila(false);
        document.getElementById("btnEditar").style.display = "none";
        document.getElementById("btnGuardar").style.display = "inline-block";
        document.getElementById("btnGuardar").disabled = false;
    }

    function crearEstructuraFila(id, datos, bloquearNombre) {
        const tbody = document.querySelector("#participantsTable tbody");
        const row = document.createElement("tr");
        row.setAttribute("data-id", id);
        row.innerHTML = `
            <td style="text-align: center; font-weight: bold;"><span class="numero-fila"></span></td>
            <td><input type="text" name="nombre_${id}" value="${datos.nombre || ''}" ${bloquearNombre ? 'readonly' : 'required'}></td>
            <td><div class="radio-group"><label><input type="radio" name="desayuno_${id}" value="Yes" ${datos.desayuno!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="desayuno_${id}" value="NO" ${datos.desayuno==='NO'?'checked':''}> No</label></div></td>
            <td><div class="radio-group"><label><input type="radio" name="almuerzo_${id}" value="Yes" ${datos.almuerzo!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="almuerzo_${id}" value="NO" ${datos.almuerzo==='NO'?'checked':''}> No</label></div></td>
            <td><div class="radio-group"><label><input type="radio" name="cena_${id}" value="Yes" ${datos.cena!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="cena_${id}" value="NO" ${datos.cena==='NO'?'checked':''}> No</label></div></td>
            <td><select name="dieta_${id}" required><option value="Omnivore" ${datos.dieta==='Omnivore'?'selected':''}>Omnivore</option><option value="Vegetarian" ${datos.dieta==='Vegetarian'?'selected':''}>Vegetarian</option><option value="Vegan" ${datos.dieta==='Vegan'?'selected':''}>Vegan</option></select></td>
            <td><select name="proteina_${id}" required><option value="Meat" ${datos.proteina==='Meat'?'selected':''}>Meat</option><option value="None" ${datos.proteina==='None'?'selected':''}>None</option></td>
            <td><select name="base_${id}" required><option value="Rice" ${datos.base==='Rice'?'selected':''}>Rice</option><option value="Pasta" ${datos.base==='Pasta'?'selected':''}>Pasta</option><option value="Bread" ${datos.base==='Bread'?'selected':''}>Bread</option></select></td>
            <td><select name="picante_${id}" required><option value="No Spicy" ${datos.picante==='No Spicy'?'selected':''}>No Spicy</option><option value="Spicy" ${datos.picante==='Spicy'?'selected':''}>Spicy</option></select></td>
            <td><div class="radio-group"><label><input type="radio" name="mariscos_${id}" value="Yes" ${datos.mariscos!=='NO'?'checked':''}> Yes</label><label><input type="radio" name="mariscos_${id}" value="NO" ${datos.mariscos==='NO'?'checked':''}> No</label></div></td>
            <td><input type="text" name="alergias_${id}" value="${datos.alergias || ''}"></td>
            <td class="admin-only" style="display:${esAdmin?'table-cell':'none'}"><button class="btn btn-delete" onclick="eliminarFila(this)">Delete</button></td>
        `;
        inicializarPremiumSelects();
        
        tbody.appendChild(row);
    }

    function eliminarFila(boton) {
    if(!confirm("Are you sure you want to delete this record?")) return;
    
    boton.closest("tr").remove();
    actualizarNumeracionFilas();
    let datosRestantes = recolectarDatosTabla();
    
    database.ref("preferencias").set(datosRestantes).then(() => {
        mostrarNotificacion("Row deleted successfully."); // <-- Notificación moderna
    }).catch((error) => {
        mostrarNotificacion("Error: " + error.message, "error"); // <-- Notificación de error
    });
}

    function actualizarNumeracionFilas() {
        const filasNumeradas = document.querySelectorAll("#participantsTable tbody tr");
        filasNumeradas.forEach((fila, indice) => {
            const spanNumero = fila.querySelector(".numero-fila");
            if (spanNumero) {
                spanNumero.textContent = indice + 1;
            }
        });
    }

    function recolectarDatosTabla() {
        const datos = [];
        document.querySelectorAll("#participantsTable tbody tr").forEach(row => {
            const id = row.getAttribute("data-id");
            datos.push({
                nombre: row.querySelector(`[name="nombre_${id}"]`).value,
                desayuno: row.querySelector(`[name="desayuno_${id}"]:checked`).value,
                almuerzo: row.querySelector(`[name="almuerzo_${id}"]:checked`).value,
                cena: row.querySelector(`[name="cena_${id}"]:checked`).value,
                dieta: row.querySelector(`[name="dieta_${id}"]`).value,
                proteina: row.querySelector(`[name="proteina_${id}"]`).value,
                base: row.querySelector(`[name="base_${id}"]`).value,
                picante: row.querySelector(`[name="picante_${id}"]`).value,
                mariscos: row.querySelector(`[name="mariscos_${id}"]:checked`).value,
                alergias: row.querySelector(`[name="alergias_${id}"]`).value
            });
        });
        return datos;
    }

    function obtenerDatosBD() {
        return JSON.parse(localStorage.getItem("preferencias_participantes") || "[]");
    }

    function cargarDatosDeLocalStorage() {
        const datos = obtenerDatosBD();
        const tbody = document.querySelector("#participantsTable tbody");
        tbody.innerHTML = "";
        datos.forEach(p => {
            if (esAdmin || p.nombre.toLowerCase() === usuarioLogueado.toLowerCase()) {
                crearEstructuraFila(Date.now() + Math.random(), p, !esAdmin);
            }
        });
    }

    function logout() {
        location.reload();
    }

    // Asegúrate de que esta función esté definida antes o después de exportarExcel
// Función para verificar si hay cambios sin guardar
function verificarEstadoGuardado() {
    if (cambiosSinGuardar) {
        mostrarNotificacion("⚠️ You have unsaved changes. Please click 'Save Changes' to protect the records.", "error");
        return false;
    }
    return true;
}

    function exportarExcel() {
    if (!verificarEstadoGuardado()) return;
    const datos = recolectarDatosTabla().filter(p => p.nombre.trim() !== "");
    if (datos.length === 0) {
        // Notificación moderna en lugar de alert
        mostrarNotificacion("No records to export.", "error");
        return;
    }

    const headers = ["NO.", "PARTICIPANT NAME", "BREAKFAST", "LUNCH", "DINNER", "DIET TYPE", "PROTEIN", "MAIN BASE", "SPICE LEVEL", "SEAFOOD/FISH", "RESTRICTIONS/ALLERGIES"];
    
    // Estilos CSS modernos para Excel
    let html = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
    <head>
        <meta charset="utf-8"/>
        <style>
            table { border-collapse: collapse; font-family: 'Segoe UI', sans-serif; }
            th { 
                background-color: #1e1b4b !important; 
                color: #ffffff !important; 
                font-weight: bold; 
                padding: 12px; 
                text-align: center; 
                border: 1px solid #4338ca;
            }
            td { 
                padding: 10px; 
                border: 1px solid #e5e7eb; 
                text-align: center; 
                color: #374151; 
            }
            .alt-row { background-color: #f9fafb; }
        </style>
    </head>
    <body>
        <table border="1">
            <thead>
                <tr>
                    ${headers.map(h => `<th>${h}</th>`).join('')}
                </tr>
            </thead>
            <tbody>`;

    datos.forEach((p, index) => {
        const rowClass = (index % 2 !== 0) ? 'class="alt-row"' : '';
        html += `<tr ${rowClass}>
            <td style="font-weight: bold; text-align: center;">${index + 1}</td>
            <td style="font-weight: bold; text-align: left;">${p.nombre}</td>
            <td>${p.desayuno}</td>
            <td>${p.almuerzo}</td>
            <td>${p.cena}</td>
            <td>${p.dieta}</td>
            <td>${p.proteina}</td>
            <td>${p.base}</td>
            <td>${p.picante}</td>
            <td>${p.mariscos}</td>
            <td>${p.alergias}</td>
        </tr>`;
    });

    html += `</tbody></table></body></html>`;

    // Descarga infalible
    const blob = new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Food_Preferences_Report.xls";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

/* =====================================
   PREMIUM SELECT
===================================== */

function crearPremiumSelect(select) {

    if (select.dataset.premiumInitialized) return;

    select.dataset.premiumInitialized = "true";

    const wrapper = document.createElement("div");
    wrapper.className = "premium-select";

    const trigger = document.createElement("div");
    trigger.className = "premium-select-trigger";

    const text = document.createElement("span");
    text.className = "premium-select-trigger-text";

    const arrow = document.createElement("span");
    arrow.className = "premium-select-arrow";
    arrow.innerHTML = "▼";

    trigger.appendChild(text);
    trigger.appendChild(arrow);

    const menu = document.createElement("div");
    menu.className = "premium-select-menu";

    [...select.options].forEach(option => {

        const item = document.createElement("div");

        item.className = "premium-select-option";

        item.textContent = option.text;

        item.dataset.value = option.value;

        if (option.value === select.value) {
            item.classList.add("active");
            text.textContent = option.text;
        }

        item.addEventListener("click", () => {

            select.value = option.value;

            select.dispatchEvent(
                new Event("change", { bubbles:true })
            );

            menu
                .querySelectorAll(".premium-select-option")
                .forEach(x => x.classList.remove("active"));

            item.classList.add("active");

            text.textContent = option.text;

            wrapper.classList.remove("open");

        });

        menu.appendChild(item);
    });

    if (!text.textContent) {
        text.textContent =
            select.options[select.selectedIndex]?.text || "Seleccionar";
    }

    trigger.addEventListener("click", e => {

        e.stopPropagation();

        document
            .querySelectorAll(".premium-select.open")
            .forEach(el => {
                if (el !== wrapper)
                    el.classList.remove("open");
            });

        wrapper.classList.toggle("open");
    });

    wrapper.appendChild(trigger);
    wrapper.appendChild(menu);

    select.classList.add("select-hidden");

    select.parentNode.insertBefore(wrapper, select.nextSibling);
}

document.addEventListener("click", () => {

    document
        .querySelectorAll(".premium-select.open")
        .forEach(el => el.classList.remove("open"));

});

function inicializarPremiumSelects(scope = document){

    scope
        .querySelectorAll("select")
        .forEach(select => {

            crearPremiumSelect(select);

        });

}
